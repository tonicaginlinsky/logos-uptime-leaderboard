name: Deploy to Vercel

on:
  push:
    branches: ["main"]
    paths:
      - "data/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Hobby plan refuses to build any deployment whose git commit author
      # isn't a Vercel team member — David's data pushes (davidrusu.me@gmail.com)
      # get readyState=BLOCKED / TEAM_ACCESS_REQUIRED. Re-author HEAD as the team
      # owner locally before deploying. Not pushed, so repo history is untouched.
      - name: Re-author HEAD as Vercel team owner
        run: |
          git config user.email "alisheryakupov@gmail.com"
          git config user.name "Alisher"
          git commit --amend --no-edit --reset-author

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
