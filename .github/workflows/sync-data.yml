name: Sync data from upstream

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest data from chair28980
        run: |
          curl -fsSL "https://raw.githubusercontent.com/chair28980/logos-uptime-leaderboard/main/data/last-7-days.txt" -o data/last-7-days.txt
          curl -fsSL "https://raw.githubusercontent.com/chair28980/logos-uptime-leaderboard/main/data/last-30-days.txt" -o data/last-30-days.txt

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git add data/last-7-days.txt data/last-30-days.txt
            git commit -m "chore: sync leaderboard data from upstream"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        run: npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
